<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PakTiers · Pakistan MC PvP Rankings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c0f;
    --surface:  #111418;
    --border:   #1e2530;
    --accent:   #7FFF00;
    --accent2:  #00c864;
    --dim:      #3a4250;
    --text:     #d0dce8;
    --muted:    #6a7a8a;
    --HT1: #FF6B00; --LT1: #FF9933;
    --HT2: #FFB800; --LT2: #FFD700;
    --HT3: #00C864; --LT3: #00A550;
    --HT4: #4FC3F7; --LT4: #29B6F6;
    --HT5: #888888; --LT5: #555555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(127,255,0,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(127,255,0,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    position: sticky; top: 0;
    background: rgba(10,12,15,.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1100px; margin: 0 auto; padding: 0 20px;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem; font-weight: 900;
    color: var(--accent);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(127,255,0,.4);
  }

  .logo span { color: var(--text); }

  .live-badge {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: .75rem; color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 4px;
  }

  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dim);
    transition: background .3s;
  }
  .live-dot.connected { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse 2s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 4px;
    padding: 20px 0 0;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem; letter-spacing: 1px;
    padding: 10px 20px;
    background: none;
    border: 1px solid transparent;
    border-bottom: none;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }

  .tab:hover { color: var(--text); border-color: var(--border); }

  .tab.active {
    color: var(--accent);
    border-color: var(--border);
    background: var(--surface);
    border-bottom-color: var(--surface);
    margin-bottom: -1px;
  }

  /* ── FILTERS ── */
  .filters {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 20px 0;
    align-items: center;
  }

  .filter-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-right: 4px;
  }

  .weapon-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: .75rem;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    border-radius: 3px;
    transition: all .15s;
    text-transform: uppercase;
  }

  .weapon-btn:hover { border-color: var(--dim); color: var(--text); }
  .weapon-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(127,255,0,.06); }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    padding-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 4px;
    transition: border-color .2s;
  }

  .stat-card.flash { border-color: var(--accent); }

  .stat-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem; font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-top: 6px;
  }

  /* ── LEADERBOARD ── */
  .lb-table { width: 100%; border-collapse: collapse; }

  .lb-header {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  .lb-row {
    border-bottom: 1px solid rgba(30,37,48,.6);
    transition: background .15s;
    animation: rowIn .3s ease both;
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lb-row:hover { background: rgba(127,255,0,.03); cursor: pointer; }
  .lb-row.highlight { animation: highlightRow .8s ease; }

  @keyframes highlightRow {
    0%   { background: rgba(127,255,0,.15); }
    100% { background: transparent; }
  }

  .lb-cell { padding: 12px; vertical-align: middle; }

  .rank-num {
    font-family: 'Orbitron', sans-serif;
    font-size: .85rem; font-weight: 700;
    color: var(--muted); width: 48px;
  }

  .rank-num.gold   { color: #FFD700; }
  .rank-num.silver { color: #C0C0C0; }
  .rank-num.bronze { color: #CD7F32; }

  .player-cell { display: flex; align-items: center; gap: 12px; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 3px;
    border: 1px solid var(--border);
    image-rendering: pixelated;
    flex-shrink: 0;
  }

  .ign { font-size: 1rem; font-weight: 700; letter-spacing: .5px; }

  .rank-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: .65rem; color: var(--muted);
    margin-top: 2px;
  }

  .tiers-cell {
    display: grid;
    grid-template-columns: repeat(8, minmax(42px, 1fr));
    gap: 10px;
    align-items: start;
    width: 100%;
    min-width: 420px;
  }

  .tier-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    min-width: 0;
  }

  .tier-circle {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    background: #0b1118;
    overflow: hidden;
    flex-shrink: 0;
  }

  .tier-circle img {
    width: 18px;
    height: 18px;
    object-fit: contain;
    display: block;
  }

  .tier-slot.empty .tier-circle {
    border-style: dashed;
    opacity: .38;
  }

  .tier-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: .62rem;
    line-height: 1;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    text-align: center;
  }


  .pts-cell {
    font-family: 'Orbitron', sans-serif;
    font-size: .9rem; font-weight: 700;
    color: var(--accent);
    text-align: right;
  }

  /* ── PROFILE ── */
  #profilePane { display: none; }

  .search-bar { display: flex; gap: 10px; padding: 20px 0; }

  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: .9rem;
    padding: 10px 14px;
    border-radius: 4px;
    outline: none;
    transition: border-color .2s;
  }

  .search-input:focus { border-color: var(--accent); }

  .search-btn {
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'Orbitron', sans-serif;
    font-size: .75rem; font-weight: 700;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity .15s;
  }

  .search-btn:hover { opacity: .85; }

  .profile-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 28px;
    display: none;
  }

  .profile-top { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }

  .profile-avatar {
    width: 80px; height: 80px;
    border-radius: 4px; border: 2px solid var(--border);
    image-rendering: pixelated;
  }

  .profile-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem; font-weight: 900;
    color: var(--accent);
  }

  .profile-rank {
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem; color: var(--muted);
    margin-top: 6px;
  }

  .profile-tiers {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }

  .profile-tier-card {
    background: rgba(0,0,0,.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
    border-left-width: 3px;
  }

  .profile-tier-weapon {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
  }

  .profile-tier-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem; font-weight: 700;
    margin-top: 6px;
  }

  /* ── QUEUE ── */
  #queuePane { display: none; }

  .queue-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    padding-top: 20px;
  }

  .queue-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    transition: border-color .3s;
  }

  .queue-card.active-queue { border-color: var(--accent2); }

  .queue-weapon {
    font-family: 'Orbitron', sans-serif;
    font-size: .8rem; font-weight: 700;
    letter-spacing: 1px; margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .queue-player {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0;
    font-size: .9rem;
    animation: rowIn .3s ease both;
  }

  .queue-avatar {
    width: 24px; height: 24px;
    border-radius: 2px; image-rendering: pixelated;
    border: 1px solid var(--border);
  }

  .queue-empty {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; color: var(--dim);
    text-align: center; padding: 12px 0;
  }

  .queue-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: .65rem; color: var(--muted);
    float: right;
  }

  /* ── EMPTY / ERROR ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem; color: var(--dim);
  }

  .empty-state .big { font-size: 2.5rem; margin-bottom: 12px; opacity: .3; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem;
    padding: 12px 20px;
    border-radius: 4px;
    z-index: 999;
    animation: toastIn .3s ease;
    box-shadow: 0 0 20px rgba(127,255,0,.2);
  }

  @keyframes toastIn { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 3px;
    height: 16px;
  }

  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* ── LEADERBOARD SEARCH ── */
  .lb-search-bar {
    display: flex; gap: 10px;
    padding: 16px 0 8px;
  }

  .lb-search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: .85rem;
    padding: 9px 14px;
    border-radius: 4px;
    outline: none;
    transition: border-color .2s;
  }

  .lb-search-input:focus { border-color: var(--accent); }
  .lb-search-input::placeholder { color: var(--muted); }

  /* ── PLAYER MODAL ── */
  .player-modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .player-modal-overlay.open { display: flex; }

  .player-modal {
    background: var(--surface);
    border: 1px solid var(--accent);
    width: 420px; max-width: 95vw;
    padding: 28px;
    border-radius: 6px;
    position: relative;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 0 40px rgba(127,255,0,.15);
    animation: modalIn .2s ease;
  }

  @keyframes modalIn {
    from { opacity:0; transform: scale(.96) translateY(10px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  .modal-close-btn {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none;
    color: var(--muted); font-size: 22px;
    cursor: pointer; line-height: 1;
    transition: color .15s;
  }

  .modal-close-btn:hover { color: var(--text); }

  .modal-player-top {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 20px;
  }

  .modal-avatar {
    width: 64px; height: 64px;
    border-radius: 4px;
    border: 2px solid var(--border);
    image-rendering: pixelated;
    flex-shrink: 0;
  }

  .modal-player-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem; font-weight: 900;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .modal-player-rank {
    font-family: 'Share Tech Mono', monospace;
    font-size: .75rem; color: var(--muted);
    margin-top: 4px;
  }

  .modal-section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: .65rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .modal-disc-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px;
    background: rgba(0,0,0,.3);
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-bottom: 4px;
  }

  .modal-disc-left { display: flex; align-items: center; gap: 10px; }

  .modal-disc-icon {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; border: 2px solid transparent;
  }

  .modal-disc-name {
    font-size: .9rem; font-weight: 700; color: var(--text);
  }

  .modal-disc-right { display: flex; align-items: center; gap: 10px; }

  .modal-tier-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: .65rem; font-weight: 700;
    padding: 2px 8px; letter-spacing: 1px;
    border: 1px solid currentColor; border-radius: 2px;
  }

  .modal-pts-val {
    font-family: 'Orbitron', sans-serif;
    font-size: .85rem; color: var(--accent);
    font-weight: 700;
  }

  .modal-total-row {
    display: flex; justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .modal-total-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
  }

  .modal-total-pts {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem; font-weight: 700;
    color: var(--accent);
  }

  /* Tier background colors for modal icons */
  .modal-tier-HT1{background:#3a1500;border-color:#FF6B00;color:#FF6B00;}
  .modal-tier-LT1{background:#3a1e00;border-color:#FF9933;color:#FF9933;}
  .modal-tier-HT2{background:#332400;border-color:#FFB800;color:#FFB800;}
  .modal-tier-LT2{background:#2a2000;border-color:#FFD700;color:#FFD700;}
  .modal-tier-HT3{background:#002a14;border-color:#00C864;color:#00C864;}
  .modal-tier-LT3{background:#002010;border-color:#00A550;color:#00A550;}
  .modal-tier-HT4{background:#001a2a;border-color:#4FC3F7;color:#4FC3F7;}
  .modal-tier-LT4{background:#001525;border-color:#29B6F6;color:#29B6F6;}
  .modal-tier-HT5{background:#1a1a1a;border-color:#888;color:#888;}
  .modal-tier-LT5{background:#141414;border-color:#555;color:#555;}

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .lb-header:nth-child(4), .lb-cell:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">PAK<span>TIERS</span></div>
    <div class="live-badge">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveStatus">Connecting...</span>
    </div>
  </div>
</header>

<div class="container">

  <div class="tabs">
    <button class="tab active" onclick="showTab('leaderboard', this)">Leaderboard</button>
    <button class="tab" onclick="showTab('profile', this)">Player Lookup</button>
    <button class="tab" onclick="showTab('queue', this)">Live Queue</button>
  </div>

  <!-- ─── LEADERBOARD ─── -->
  <div id="leaderboardPane">
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-num skeleton" style="width:60px;height:32px"></div><div class="stat-label" style="margin-top:10px">Total Players</div></div>
      <div class="stat-card"><div class="stat-num skeleton" style="width:60px;height:32px"></div><div class="stat-label" style="margin-top:10px">Tiered</div></div>
      <div class="stat-card"><div class="stat-num skeleton" style="width:60px;height:32px"></div><div class="stat-label" style="margin-top:10px">In Queue</div></div>
      <div class="stat-card"><div class="stat-num skeleton" style="width:60px;height:32px"></div><div class="stat-label" style="margin-top:10px">Matches Played</div></div>
    </div>

    <div class="filters">

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG — Auto-detect: same server pe chal raha hai (Railway + local dono)
const API = window.location.origin;
const WS  = window.location.origin.replace(/^https/, 'wss').replace(/^http/, 'ws');
// ─────────────────────────────────────────────────────────────
//  Agar alag server pe deploy karo to neeche hardcode karo:
//  const API = 'https://paktiers-api.up.railway.app';
//  const WS  = 'wss://paktiers-api.up.railway.app';

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
let currentWeapon = 'all';
let ws = null;
let reconnectTimer = null;
let stats = { totalPlayers:0, tieredPlayers:0, queuedNow:0, totalMatches:0 };

const TIER_COLOR = {
  HT1:'#FF6B00', LT1:'#FF9933', HT2:'#FFB800', LT2:'#FFD700',
  HT3:'#00C864', LT3:'#00A550', HT4:'#4FC3F7', LT4:'#29B6F6',
  HT5:'#888888', LT5:'#555555'};

const GAMEMODE_ORDER = ['Sword', 'Axe', 'Mace', 'Crystal', 'Netherite', 'UHC', 'Pot', 'SMP'];

function getGamemodeIconHTML(mode) {
  const btn = [...document.querySelectorAll('.weapon-btn')].find(
    b => (b.getAttribute('onclick') || '').includes(`filterWeapon('${mode}'`)
  );
  const src = btn?.querySelector('img')?.getAttribute('src');
  return src ? `<img src="${src}" alt="${mode}">` : '🎮';
}

function renderTierSlots(tiers = {}) {
  return GAMEMODE_ORDER.map(mode => {
    const tier = tiers[mode];
    const iconHTML = getGamemodeIconHTML(mode);
    const color = tier ? (TIER_COLOR[tier] || '#888') : 'var(--dim)';
    const emptyClass = tier ? '' : ' empty';
    const title = tier ? `${mode}: ${tier}` : `${mode}: —`;

    return `
      <div class="tier-slot${emptyClass}" title="${title}">
        <div class="tier-circle" style="border-color:${color};${tier ? `box-shadow:0 0 0 1px ${color} inset, 0 0 10px ${color}22;` : ''}">
          ${iconHTML}
        </div>
        <div class="tier-value" style="color:${color}">${tier || '—'}</div>
      </div>`;
  }).join('');
}

// ─────────────────────────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────────────────────────
function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('leaderboardPane').style.display = name === 'leaderboard' ? '' : 'none';
  document.getElementById('profilePane').style.display     = name === 'profile'     ? '' : 'none';
  document.getElementById('queuePane').style.display       = name === 'queue'       ? '' : 'none';
  if (name === 'queue') fetchQueue();
}

// ─────────────────────────────────────────────────────────────
//  FETCH HELPERS
// ─────────────────────────────────────────────────────────────
async function apiFetch(endpoint) {
  const r = await fetch(API + endpoint);
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}

// ─────────────────────────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────────────────────────
async function fetchStats() {
  try {
    const d = await apiFetch('/api/stats');
    stats = d;
    renderStats(d);
  } catch (_) {}
}

function renderStats(d) {
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${d.totalPlayers}</div><div class="stat-label">Total Players</div></div>
    <div class="stat-card"><div class="stat-num">${d.tieredPlayers}</div><div class="stat-label">Tiered</div></div>
    <div class="stat-card"><div class="stat-num">${d.queuedNow}</div><div class="stat-label">In Queue</div></div>
    <div class="stat-card"><div class="stat-num">${d.totalMatches}</div><div class="stat-label">Matches Played</div></div>
  `;
}

function flashStat(index) {
  const cards = document.querySelectorAll('.stat-card');
  if (cards[index]) {
    cards[index].classList.add('flash');
    setTimeout(() => cards[index].classList.remove('flash'), 800);
  }
}

// ─────────────────────────────────────────────────────────────
//  LEADERBOARD
// ─────────────────────────────────────────────────────────────
let cachedPlayers = [];
let lbSearchQuery = '';

async function fetchLeaderboard(weapon = 'all') {
  try {
    const d = await apiFetch(`/api/leaderboard?weapon=${weapon}`);
    cachedPlayers = d.players || [];
    renderLeaderboard(cachedPlayers);
  } catch (_) {
    document.getElementById('lbBody').innerHTML =
      `<tr><td colspan="4" class="lb-cell">
        <div class="empty-state">
          <div class="big">⚠️</div>
          API server se connect nahi ho pa raha.<br>
          <span style="font-size:.7rem;margin-top:8px;display:block">Make sure api_server.js Railway pe chal raha hai.</span>
        </div>
      </td></tr>`;
  }
}

  tbody.innerHTML = filtered.map((p, i) => {
    const globalIdx = players.indexOf(p);
    const rankClass = globalIdx === 0 ? 'gold' : globalIdx === 1 ? 'silver' : globalIdx === 2 ? 'bronze' : '';
    const medal     = globalIdx === 0 ? '🥇'  : globalIdx === 1 ? '🥈'     : globalIdx === 2 ? '🥉'     : `${globalIdx+1}`;
    const tierGrid = renderTierSlots(p.tiers || {});
    const highlight = highlightIgn && p.ign === highlightIgn ? ' highlight' : '';

    // Build serialized player data for modal
    const playerData = encodeURIComponent(JSON.stringify({
      ign: p.ign,
      avatar: p.avatar,
      rankTitle: p.rankTitle,
      totalPts: p.totalPts,
      tiers: p.tiers || {},
      rank: globalIdx + 1
    }));

    return `
      <tr class="lb-row${highlight}" onclick="openPlayerModal('${playerData}')" style="animation-delay:${i*40}ms">
        <td class="lb-cell"><div class="rank-num ${rankClass}">${medal}</div></td>
        <td class="lb-cell">
          <div class="player-cell">
            <img class="avatar" src="${p.avatar}" alt="${p.ign}" onerror="this.src='https://mc-heads.net/avatar/steve/36'">
            <div>
              <div class="ign">${p.ign}</div>
              <div class="rank-title">${p.rankTitle.emoji} ${p.rankTitle.label}</div>
            </div>
          </div>
        </td>
        <td class="lb-cell"><div class="tiers-cell">${tierGrid}</div></td>
        <td class="lb-cell"><div class="pts-cell">${p.region || p.regionName || "—"}</div></td>
      </tr>`;
  }).join('');
}

function filterWeapon(weapon, el) {
  currentWeapon = weapon;
  document.querySelectorAll('.weapon-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  fetchLeaderboard(weapon);
}

function openPlayerModal(encodedData) {
  const p = JSON.parse(decodeURIComponent(encodedData));
  const content = document.getElementById('playerModalContent');

  const tierRows = Object.entries(p.tiers || {}).map(([w, t]) => {
    const wInfo = WEAPON_INFO[w] || {emoji:'⚔️', bg:'#1a1a1a'};
    const pts = TIER_PTS[t] || 0;
    return `
      <div class="modal-disc-row">
        <div class="modal-disc-left">
          <div class="modal-disc-icon modal-tier-${t}" style="background:${wInfo.bg};">${wInfo.emoji}</div>
          <div class="modal-disc-name">${w}</div>
        </div>
        <div class="modal-disc-right">
          <span class="modal-tier-tag modal-tier-${t}">${t}</span>
          <span class="modal-pts-val">+${pts}pts</span>
        </div>
      </div>`;
  }).join('');

  content.innerHTML = `
    <div class="modal-player-top">
      <img class="modal-avatar" src="${p.avatar}" alt="${p.ign}" onerror="this.src='https://mc-heads.net/avatar/steve/64'">
      <div>
        <div class="modal-player-name">${p.ign}</div>
        <div class="modal-player-rank">${p.rankTitle.emoji} ${p.rankTitle.label} · Rank #${p.rank}</div>
      </div>
    </div>
    <div class="modal-section-label">Gamemodes</div>
    ${tierRows || '<div style="color:var(--muted);font-family:\'Share Tech Mono\',monospace;font-size:.8rem;padding:12px 0;">No tiers assigned yet.</div>'}
    <div class="modal-total-row">
      <span class="modal-total-label">Total Points</span>
      <span class="modal-total-pts">${p.totalPts}</span>
    </div>
  `;

  document.getElementById('playerModal').classList.add('open');
}

function closePlayerModal() {
  document.getElementById('playerModal').classList.remove('open');
}

document.getElementById('playerModal').addEventListener('click', e => {
  if (e.target.id === 'playerModal') closePlayerModal();
});

// ─────────────────────────────────────────────────────────────
async function lookupPlayer() {
  const ign   = document.getElementById('ignInput').value.trim();
  if (!ign) return;
  const card  = document.getElementById('profileCard');
  const empty = document.getElementById('profileEmpty');
  card.style.display  = 'none';
  empty.style.display = '';
  empty.innerHTML = '<div class="big" style="animation:pulse 1s infinite">⏳</div>Loading...';

  try {
    const p = await apiFetch(`/api/player/${encodeURIComponent(ign)}`);
    renderProfile(p);
  } catch (_) {
    empty.innerHTML = `<div class="big">❌</div>Player "<b>${ign}</b>" not found or not registered.`;
  }
}

function renderProfile(p) {
  const card  = document.getElementById('profileCard');
  const empty = document.getElementById('profileEmpty');
  empty.style.display = 'none';

  const tierCards = Object.entries(p.tiers || {}).map(([w, t]) => `
    <div class="profile-tier-card" style="border-left-color:${TIER_COLOR[t]||'#888'}">
      <div class="profile-tier-weapon">${w}</div>
      <div class="profile-tier-value" style="color:${TIER_COLOR[t]||'#888'}">${t}</div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="profile-top">
      <img class="profile-avatar" src="${p.avatar}" alt="${p.ign}" onerror="this.src='https://mc-heads.net/avatar/steve/80'">
      <div>
        <div class="profile-name">${p.ign}</div>
        <div class="profile-rank">${p.rankTitle.emoji} ${p.rankTitle.label} · ${p.totalPts} pts</div>
      </div>
    </div>
    <div class="profile-tiers">
      ${tierCards || '<div style="color:var(--muted);font-family:\'Share Tech Mono\',monospace;font-size:.8rem">No tiers assigned yet.</div>'}
    </div>
  `;
  card.style.display = 'block';
}

function quickProfile(ign) {
  document.getElementById('ignInput').value = ign;
  showTab('profile', document.querySelectorAll('.tab')[1]);
  lookupPlayer();
}

// ─────────────────────────────────────────────────────────────
//  WEBSOCKET — Real-time updates
// ─────────────────────────────────────────────────────────────
function connectWS() {
  const dot    = document.getElementById('liveDot');
  const status = document.getElementById('liveStatus');

  try {
    ws = new WebSocket(WS);

    ws.onopen = () => {
      dot.classList.add('connected');
      status.textContent = 'Live';
      clearTimeout(reconnectTimer);
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);

        if (msg.type === 'init') {
          // Server se full state mili — sab refresh karo
          fetchStats();
          fetchLeaderboard(currentWeapon);
          return;
        }

        if (msg.type === 'tier_updated') {
          fetchLeaderboard(currentWeapon).then(() => {
            // Updated player ko highlight karo
          });
          fetchStats();
          flashStat(1);
          showToast(`🔄 ${msg.ign} — ${msg.weapon} tier updated to ${msg.tier}`);
        }

        if (msg.type === 'tier_removed') {
          fetchLeaderboard(currentWeapon);
          fetchStats();
          showToast(`🗑️ ${msg.ign} — ${msg.weapon} tier removed`);
        }

        if (msg.type === 'player_registered') {
          fetchStats();
          flashStat(0);
          showToast(`✅ ${msg.player.ign} registered!`);
        }

        if (msg.type === 'queue_updated') {
          if (document.getElementById('queuePane').style.display !== 'none') {
            fetchQueue();
          }
          fetchStats();
          flashStat(2);
        }

        if (msg.type === 'match_created') {
          fetchStats();
          flashStat(3);
          const { match } = msg;
          showToast(`🏆 Match! ${match.players[0].ign} vs ${match.players[1].ign} — ${match.weapon}`);
        }
      } catch (_) {}
    };

    ws.onclose = () => {
      dot.classList.remove('connected');
      status.textContent = 'Reconnecting...';
      reconnectTimer = setTimeout(connectWS, 4000);
    };

    ws.onerror = () => {
      dot.classList.remove('connected');
      status.textContent = 'Offline';
    };
  } catch (_) {}
}

// ─────────────────────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.createElement('div');
  el.className   = 'toast';
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
fetchStats();
fetchLeaderboard();
connectWS();

// Fallback 30s refresh agar WS disconnect ho
setInterval(() => {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    fetchLeaderboard(currentWeapon);
    fetchStats();
  }
}, 30000);
</script>
